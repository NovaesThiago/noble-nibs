include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/l10n/**"
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    invalid_annotation_target: ignore # ruído do freezed/json

linter:
  rules:
    public_member_api_docs: false # ligar se virar pacote público
    prefer_const_constructors: true
    require_trailing_commas: true
    avoid_print: true # nada de print — usar logger
    use_build_context_synchronously: true
