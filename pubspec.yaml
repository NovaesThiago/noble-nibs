name: noble_nibs
description: Loja de grãos de café — app mobile premium em Flutter.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Estado / DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navegação
  go_router: ^14.2.0

  # Modelos / imutabilidade
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Funcional / erros
  fpdart: ^1.1.0

  # Rede (preparado p/ backend real)
  dio: ^5.5.0
  pretty_dio_logger: ^1.4.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI / imagens / fontes
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # i18n / formatação
  intl: ^0.20.2

  # Segurança
  local_auth: ^2.2.0
  flutter_jailbreak_detection: ^1.10.0

  # Logging
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  very_good_analysis: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true # habilita gen-l10n
  assets:
    - assets/images/
    - assets/illustrations/
    - assets/icons/
    - assets/mock/
